services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finan
      POSTGRES_PASSWORD: finan
      POSTGRES_DB: finanpessoal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data:
